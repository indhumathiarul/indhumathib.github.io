<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Indhu's Coding Corner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810;--surface:#10101c;--surface2:#18182a;--border:#252538;
  --accent:#7c6aff;--accent2:#ff6a9b;--accent3:#6affda;--gold:#ffc864;
  --text:#eeeef8;--muted:#7878a0;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --red:#ff4a6a;--green:#4aff9e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* LOGIN */
#loginScreen {
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;
  background:var(--bg);
}
.login-box {
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:2.5rem 2rem;width:min(380px,90vw);text-align:center;
}
.login-box h1{font-size:1.4rem;font-weight:800;margin-bottom:0.4rem;}
.login-box p{font-family:var(--mono);font-size:0.72rem;color:var(--muted);margin-bottom:2rem;}
.field{margin-bottom:1rem;text-align:left;}
.field label{font-family:var(--mono);font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:0.4rem;}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;padding:0.7rem 0.9rem;color:var(--text);
  font-family:var(--mono);font-size:0.82rem;outline:none;transition:border-color 0.2s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:120px;line-height:1.7;}
.login-error{color:var(--red);font-family:var(--mono);font-size:0.72rem;margin-bottom:1rem;display:none;}

/* ADMIN LAYOUT */
#adminScreen{display:none;position:relative;z-index:1;}
.admin-nav{
  background:rgba(8,8,16,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.admin-logo{font-family:var(--mono);font-size:0.78rem;color:var(--accent3);}
.admin-logo span{color:var(--accent);}
.admin-nav-right{display:flex;align-items:center;gap:1rem;}
.back-btn{font-family:var(--mono);font-size:0.7rem;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.back-btn:hover{color:var(--accent3);}
.logout-btn{font-family:var(--mono);font-size:0.7rem;color:var(--red);cursor:pointer;border:1px solid rgba(255,74,106,0.3);padding:0.25rem 0.6rem;border-radius:3px;background:transparent;transition:all 0.2s;}
.logout-btn:hover{background:rgba(255,74,106,0.1);}

.admin-body{max-width:820px;margin:0 auto;padding:2.5rem 1.5rem;}

/* TABS */
.tabs{display:flex;gap:0.5rem;margin-bottom:2.5rem;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{font-family:var(--mono);font-size:0.75rem;padding:0.6rem 1.2rem;cursor:pointer;color:var(--muted);border:none;background:transparent;letter-spacing:0.06em;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* EDITOR MODES */
.mode-toggle{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
.mode-btn{font-family:var(--mono);font-size:0.7rem;padding:0.35rem 0.9rem;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.06em;}
.mode-btn.active{background:rgba(124,106,255,0.15);border-color:var(--accent);color:var(--accent);}

/* HTML UPLOAD DROP ZONE */
.drop-zone{
  border:2px dashed var(--border);border-radius:8px;padding:3rem 2rem;text-align:center;
  cursor:pointer;transition:all 0.2s;margin-bottom:1.25rem;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(124,106,255,0.05);}
.drop-zone-icon{font-size:2.5rem;margin-bottom:0.75rem;}
.drop-zone p{font-family:var(--mono);font-size:0.78rem;color:var(--muted);}
.drop-zone p strong{color:var(--accent3);}
#fileInput{display:none;}
.file-chosen{font-family:var(--mono);font-size:0.72rem;color:var(--accent3);margin-top:0.75rem;display:none;}

/* RICH EDITOR */
.rich-toolbar{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.5rem;}
.rich-toolbar button{font-family:var(--mono);font-size:0.7rem;padding:0.3rem 0.6rem;border-radius:3px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all 0.2s;}
.rich-toolbar button:hover{border-color:var(--accent);color:var(--accent);}
.rich-editor{
  background:var(--surface2);border:1px solid var(--border);border-radius:5px;
  padding:1rem;min-height:280px;outline:none;color:var(--text);
  font-size:0.9rem;line-height:1.8;
}
.rich-editor:focus{border-color:var(--accent);}
.rich-editor h1,.rich-editor h2,.rich-editor h3{margin-bottom:0.5rem;}
.rich-editor pre{background:rgba(0,0,0,0.4);padding:1rem;border-radius:4px;margin:0.75rem 0;overflow-x:auto;font-family:var(--mono);font-size:0.8rem;}
.rich-editor code{font-family:var(--mono);background:rgba(124,106,255,0.15);padding:0.1rem 0.35rem;border-radius:3px;font-size:0.82rem;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.4rem;font-family:var(--mono);font-size:0.78rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;border-radius:4px;transition:all 0.2s;cursor:pointer;border:none;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#6a58ff;transform:translateY(-1px);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,74,106,0.4);}
.btn-danger:hover{background:rgba(255,74,106,0.1);}
.btn-ghost{background:transparent;color:var(--accent3);border:1px solid rgba(106,255,218,0.35);}
.btn-ghost:hover{background:rgba(106,255,218,0.07);}

.status-msg{font-family:var(--mono);font-size:0.75rem;padding:0.6rem 1rem;border-radius:4px;margin-top:1rem;display:none;}
.status-msg.success{background:rgba(74,255,158,0.12);color:var(--green);border:1px solid rgba(74,255,158,0.3);}
.status-msg.error{background:rgba(255,74,106,0.12);color:var(--red);border:1px solid rgba(255,74,106,0.3);}

/* POSTS LIST */
.posts-list{display:flex;flex-direction:column;gap:1rem;}
.admin-post{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;}
.admin-post-info h3{font-size:0.95rem;font-weight:700;margin-bottom:0.3rem;}
.admin-post-info p{font-family:var(--mono);font-size:0.68rem;color:var(--muted);}
.admin-post-actions{display:flex;gap:0.5rem;flex-shrink:0;}
.tag{font-family:var(--mono);font-size:0.6rem;padding:0.18rem 0.5rem;border-radius:2px;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;}
.tag-dotnet{background:rgba(124,106,255,0.18);color:var(--accent);}
.tag-aws{background:rgba(255,106,155,0.18);color:var(--accent2);}
.tag-tech{background:rgba(106,255,218,0.12);color:var(--accent3);}
.tag-patterns{background:rgba(255,200,100,0.15);color:var(--gold);}
.tag-cloud{background:rgba(100,200,255,0.12);color:#64c8ff;}

/* SECTION HEADINGS */
.admin-section-title{font-size:1.15rem;font-weight:800;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;}
.admin-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* MOBILE */
@media(max-width:600px){
  .admin-body{padding:1.5rem 1rem;}
  .mode-toggle{flex-wrap:wrap;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:0.75rem;">⚡</div>
    <h1>Admin Access</h1>
    <p>indhu's coding corner</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <p class="login-error" id="loginError">Wrong password. Try again.</p>
    <button class="btn btn-primary" style="width:100%;" onclick="login()">Login →</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <nav class="admin-nav">
    <div class="admin-logo"><span>//</span> admin panel</div>
    <div class="admin-nav-right">
      <a href="index.html" class="back-btn">← View site</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="admin-body">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('new', this)">✍️ New Post</button>
      <button class="tab" onclick="switchTab('manage', this)">📋 Manage Posts</button>
    </div>

    <!-- NEW POST TAB -->
    <div class="tab-content active" id="tab-new">
      <div class="admin-section-title">Create New Post</div>

      <!-- MODE TOGGLE -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeWrite" onclick="setMode('write')">✍️ Write Article</button>
        <button class="mode-btn" id="modeUpload" onclick="setMode('upload')">📁 Upload HTML File</button>
      </div>

      <!-- COMMON FIELDS -->
      <div class="field">
        <label>Post Title *</label>
        <input type="text" id="postTitle" placeholder="e.g. gRPC in C# — From Zero to Production">
      </div>
      <div class="field">
        <label>Short Description</label>
        <input type="text" id="postDesc" placeholder="One line summary shown on the blog grid">
      </div>
      <div class="field">
        <label>Topic Tag</label>
        <select id="postTag">
          <option value=".NET">.NET</option>
          <option value="AWS">AWS</option>
          <option value="Cloud">Cloud</option>
          <option value="Patterns">Patterns</option>
          <option value="Tech">Tech</option>
        </select>
      </div>

      <!-- WRITE MODE -->
      <div id="writeMode">
        <div class="field">
          <label>Article Content</label>
          <div class="rich-toolbar">
            <button onclick="fmt('bold')"><b>B</b></button>
            <button onclick="fmt('italic')"><i>I</i></button>
            <button onclick="fmtH('h2')">H2</button>
            <button onclick="fmtH('h3')">H3</button>
            <button onclick="insertCode()">{ } Code</button>
            <button onclick="fmt('insertUnorderedList')">• List</button>
            <button onclick="fmt('insertOrderedList')">1. List</button>
            <button onclick="insertLink()">🔗 Link</button>
          </div>
          <div class="rich-editor" id="articleEditor" contenteditable="true" placeholder="Start writing your article here..."></div>
        </div>
      </div>

      <!-- UPLOAD MODE -->
      <div id="uploadMode" style="display:none;">
        <div class="field">
          <label>HTML File</label>
          <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
            <div class="drop-zone-icon">📂</div>
            <p>Tap to select your <strong>.html file</strong></p>
            <p style="margin-top:0.4rem;font-size:0.68rem;">or drag and drop here</p>
            <input type="file" id="fileInput" accept=".html" onchange="fileSelected(event)">
            <div class="file-chosen" id="fileChosen">✓ File selected</div>
          </div>
          <p style="font-family:var(--mono);font-size:0.68rem;color:var(--muted);">Your HTML guide will be stored and displayed exactly as-is inside the post viewer.</p>
        </div>
      </div>

      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="publishPost()">🚀 Publish Post</button>
        <button class="btn btn-ghost" onclick="previewPost()">👁 Preview</button>
      </div>
      <div class="status-msg" id="publishStatus"></div>
    </div>

    <!-- MANAGE TAB -->
    <div class="tab-content" id="tab-manage">
      <div class="admin-section-title">All Posts</div>
      <div class="posts-list" id="adminPostsList">
        <p style="font-family:var(--mono);font-size:0.78rem;color:var(--muted);">Loading posts...</p>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const ADMIN_PASSWORD = "indhu2024secure"; // ← change this

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentMode = 'write';
  let selectedFileContent = null;

  // ── LOGIN ──
  window.login = function() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadAdminPosts();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  };

  window.logout = function() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  };

  // ── TABS ──
  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'manage') loadAdminPosts();
  };

  // ── MODE ──
  window.setMode = function(mode) {
    currentMode = mode;
    document.getElementById('modeWrite').classList.toggle('active', mode === 'write');
    document.getElementById('modeUpload').classList.toggle('active', mode === 'upload');
    document.getElementById('writeMode').style.display = mode === 'write' ? 'block' : 'none';
    document.getElementById('uploadMode').style.display = mode === 'upload' ? 'block' : 'none';
  };

  // ── FILE UPLOAD ──
  window.fileSelected = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      selectedFileContent = ev.target.result;
      document.getElementById('fileChosen').style.display = 'block';
      document.getElementById('fileChosen').textContent = `✓ ${file.name} loaded`;
    };
    reader.readAsText(file);
  };

  window.dragOver = function(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); };
  window.dragLeave = function() { document.getElementById('dropZone').classList.remove('drag-over'); };
  window.dropFile = function(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.html')) {
      const reader = new FileReader();
      reader.onload = ev => {
        selectedFileContent = ev.target.result;
        document.getElementById('fileChosen').style.display = 'block';
        document.getElementById('fileChosen').textContent = `✓ ${file.name} loaded`;
      };
      reader.readAsText(file);
    }
  };

  // ── RICH EDITOR ──
  window.fmt = function(cmd) { document.execCommand(cmd, false, null); };
  window.fmtH = function(tag) { document.execCommand('formatBlock', false, tag); };
  window.insertCode = function() {
    const sel = window.getSelection();
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0);
      const pre = document.createElement('pre');
      pre.innerHTML = '<code>' + (sel.toString() || 'your code here') + '</code>';
      range.deleteContents();
      range.insertNode(pre);
    }
  };
  window.insertLink = function() {
    const url = prompt('Enter URL:');
    if (url) document.execCommand('createLink', false, url);
  };

  // ── PUBLISH ──
  window.publishPost = async function() {
    const title = document.getElementById('postTitle').value.trim();
    const desc = document.getElementById('postDesc').value.trim();
    const tag = document.getElementById('postTag').value;
    const statusEl = document.getElementById('publishStatus');

    if (!title) { showStatus('Please enter a title.', 'error'); return; }

    let content = '';
    let contentType = 'html';

    if (currentMode === 'write') {
      content = document.getElementById('articleEditor').innerHTML;
      contentType = 'article';
      if (!content || content === '<br>') { showStatus('Please write some content.', 'error'); return; }
    } else {
      if (!selectedFileContent) { showStatus('Please select an HTML file.', 'error'); return; }
      content = selectedFileContent;
      contentType = 'html-file';
    }

    try {
      showStatus('Publishing...', 'success');
      await addDoc(collection(db, 'posts'), {
        title, description: desc, tag, content, contentType,
        createdAt: serverTimestamp()
      });
      showStatus('✓ Post published successfully!', 'success');
      // Reset form
      document.getElementById('postTitle').value = '';
      document.getElementById('postDesc').value = '';
      document.getElementById('articleEditor').innerHTML = '';
      selectedFileContent = null;
      document.getElementById('fileChosen').style.display = 'none';
    } catch(e) {
      showStatus('Error publishing: ' + e.message, 'error');
    }
  };

  window.previewPost = function() {
    const title = document.getElementById('postTitle').value || 'Preview';
    const content = currentMode === 'write'
      ? document.getElementById('articleEditor').innerHTML
      : (selectedFileContent || '<p>No content loaded</p>');
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
      <style>body{background:#080810;color:#eeeef8;font-family:sans-serif;padding:2rem;max-width:800px;margin:0 auto;}</style>
      </head><body><h1>${title}</h1><hr style="border-color:#252538;margin:1.5rem 0;">${content}</body></html>`);
  };

  function showStatus(msg, type) {
    const el = document.getElementById('publishStatus');
    el.textContent = msg; el.className = `status-msg ${type}`; el.style.display = 'block';
    if (type === 'success' && msg.includes('✓')) setTimeout(() => el.style.display = 'none', 4000);
  }

  // ── MANAGE POSTS ──
  async function loadAdminPosts() {
    const list = document.getElementById('adminPostsList');
    try {
      const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      if (snap.empty) { list.innerHTML = '<p style="font-family:var(--mono);font-size:0.78rem;color:var(--muted);">No posts yet. Create your first one!</p>'; return; }
      const tagMap = {'.NET':'tag-dotnet','AWS':'tag-aws','Cloud':'tag-cloud','Patterns':'tag-patterns','Tech':'tag-tech'};
      list.innerHTML = snap.docs.map(d => {
        const p = d.data();
        const date = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
        return `<div class="admin-post">
          <div class="admin-post-info">
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;">
              <span class="tag ${tagMap[p.tag]||'tag-tech'}">${p.tag}</span>
              <span style="font-family:var(--mono);font-size:0.62rem;color:var(--muted);">${date} · ${p.contentType}</span>
            </div>
            <h3>${p.title}</h3>
            <p>${p.description || '—'}</p>
          </div>
          <div class="admin-post-actions">
            <a href="post.html?id=${d.id}" target="_blank" class="btn btn-ghost" style="font-size:0.68rem;padding:0.4rem 0.8rem;">View</a>
            <button class="btn btn-danger" style="font-size:0.68rem;padding:0.4rem 0.8rem;" onclick="deletePost('${d.id}', this)">Delete</button>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = `<p style="color:var(--red);font-family:var(--mono);font-size:0.78rem;">Error loading posts: ${e.message}</p>`;
    }
  }

  window.deletePost = async function(id, btn) {
    if (!confirm('Delete this post? This cannot be undone.')) return;
    btn.textContent = '...';
    await deleteDoc(doc(db, 'posts', id));
    loadAdminPosts();
  };
</script>
</body>
</html>
